name: Tests

on:
  pull_request:

jobs:
  backend:
    name: Backend (PHPUnit)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: app_db_test
          MYSQL_USER: app_user
          MYSQL_PASSWORD: app_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, mbstring, intl, zip, bcmath
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader
        working-directory: backend

      - name: Generate JWT keys
        run: |
          mkdir -p config/jwt
          openssl genpkey -algorithm RSA \
            -out config/jwt/private.pem \
            -aes256 -pass pass:test_passphrase
          openssl pkey \
            -in config/jwt/private.pem \
            -passin pass:test_passphrase \
            -pubout -out config/jwt/public.pem
        working-directory: backend

      - name: Run migrations
        run: php bin/console doctrine:migrations:migrate --no-interaction --env=test
        working-directory: backend
        env:
          DATABASE_URL: mysql://app_user:app_password@127.0.0.1:3306/app_db_test?serverVersion=8.4.9&charset=utf8mb4

      - name: Run PHPUnit
        run: php vendor/bin/phpunit --testdox
        working-directory: backend
        env:
          DATABASE_URL: mysql://app_user:app_password@127.0.0.1:3306/app_db_test?serverVersion=8.4.9&charset=utf8mb4

  frontend:
    name: Frontend (Playwright)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare environment
        run: cp .env.example .env

      - name: Start full stack
        run: docker compose up -d --build
        timeout-minutes: 15

      - name: Wait for backend
        run: |
          echo "Waiting for backend API..."
          until curl -sf -o /dev/null -X POST http://localhost:8000/api/auth/register \
            -H "Content-Type: application/json" -d '{}'; do
            sleep 3
          done
          echo "Backend ready."

      - name: Wait for frontend
        run: |
          echo "Waiting for frontend..."
          until curl -sf -o /dev/null http://localhost:4000; do
            sleep 3
          done
          echo "Frontend ready."

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
