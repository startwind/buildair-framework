version: '3.8'

services:
  mysql:
    image: mysql:8.4.9
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-app_db}
      MYSQL_USER: ${DB_USER:-app_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-app_password}
    ports:
      - "3309:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_ENV: dev
      APP_SECRET: ${APP_SECRET:-change_me_in_production_32chars}
      DATABASE_URL: "mysql://${DB_USER:-app_user}:${DB_PASSWORD:-app_password}@mysql:3306/${DB_NAME:-app_db}?serverVersion=8.4.9&charset=utf8mb4"
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-jwt_passphrase_change_me}
      MAILER_DSN: ${MAILER_DSN:-null://null}
      DOUBLE_OPT_IN: ${DOUBLE_OPT_IN:-false}
      APP_URL: ${APP_URL:-http://localhost:3000}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@example.com}
    ports:
      - "8000:80"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
      - backend_jwt:/var/www/html/config/jwt
      - backend_cache:/var/www/html/var

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:8000}
    ports:
      - "4000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_nuxt:/app/.nuxt

volumes:
  mysql_data:
  backend_vendor:
  backend_jwt:
  backend_cache:
  frontend_node_modules:
  frontend_nuxt:
